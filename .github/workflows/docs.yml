name: Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; a newer push supersedes a running one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # mkdocstrings-nim parses the source with the Nim compiler to pull out the
      # doc comments. That is a parse only, no semantic analysis, so the SDL3 and
      # Box2D libraries are not needed and no window opens here. The screenshots
      # are committed in docs/assets.
      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # mkdocstrings-nim's extractor does `import compiler/ast`. The prebuilt Nim
      # that setup-nim-action installs does ship the compiler sources (under
      # <prefix>/compiler), but that prefix is not on Nim's default module path,
      # which is only the $lib subdirs and the nimble package path, so the import
      # fails. Put the install prefix on the path through a user config that the
      # extractor's `nim c` reads. The prefix is derived from libPath so it is
      # symlink-proof, and the last lines fail loudly here if it still does not
      # resolve, rather than deep inside the mkdocs build.
      - name: Expose the bundled Nim compiler sources to the doc extractor
        run: |
          libpath=$(nim --hints:off --eval:'import std/compilesettings; echo querySetting(SingleValueSetting.libPath)' | tail -1)
          prefix=$(dirname "$libpath")
          echo "Nim prefix: $prefix"
          test -f "$prefix/compiler/ast.nim"
          mkdir -p ~/.config/nim
          echo "path:\"$prefix\"" >> ~/.config/nim/nim.cfg
          printf 'import compiler/ast\n' > /tmp/compilercheck.nim
          nim c -c --hints:off /tmp/compilercheck.nim

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install the docs toolchain
        run: pip install -r docs/requirements.txt

      - name: Build the docs
        run: mkdocs build --strict

      - name: Upload the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
