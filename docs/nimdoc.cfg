# $1 - number of listing in document, $2 - language (e.g. langNim), $3 - anchor
doc.listing_start = "<pre$3 class=\"listing\">"
doc.listing_end = "</pre>"

# * $analytics: Google analytics location, includes <script> tags
doc.file = """<?xml version="1.0" encoding="utf-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "https://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<!--  This file is generated by Nim. -->
<html xmlns="https://www.w3.org/1999/xhtml" xml:lang="en" lang="en" data-theme="auto">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$title</title>

<!-- Google fonts -->
<link href='https://fonts.googleapis.com/css?family=Lato:400,600,900' rel='stylesheet' type='text/css'/>
<link href='https://fonts.googleapis.com/css?family=Source+Code+Pro:400,500,600' rel='stylesheet' type='text/css'/>

<!-- Favicon -->
<link rel="shortcut icon" href="data:image/x-icon;base64,"/>
<link rel="icon" type="image/png" sizes="32x32" href="data:image/png;base64,">

<!-- CSS -->
<link rel="stylesheet" type="text/css" href="${nimdoccss}?v=$nimVersion">

</head>
<body>
  <div class="document" id="documentId">
    <div class="container">
      <h1 class="title">$title</h1>$subtitle
      $content
      <div class="twelve-columns footer">
        <span class="nim-sprite"></span>
        <br>
        <small style="color: var(--hint);">Made with Nim. Generated: $date $time UTC</small>
      </div>
    </div>
  </div>
  $analytics
  <script>
  /* Give highlighted Nim listings a line-number gutter, using the same markup
     and styling rstgen emits for code blocks with :number-lines:. Plain
     listings, like shell transcripts, stay as they are. */
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll("pre.listing").forEach(function (pre) {
      if (pre.closest(".line-nums-table")) return;
      if (!pre.querySelector(".Keyword, .Identifier, .Comment")) return;
      var t = pre.textContent;
      while (t.length > 0 && t.charAt(t.length - 1) == "\n") t = t.slice(0, -1);
      var n = t.split("\n").length;
      if (n < 2) return;
      var nums = "";
      for (var i = 1; i <= n; i++) nums += i + "\n";
      var table = document.createElement("table");
      table.className = "line-nums-table";
      var row = table.insertRow();
      var left = row.insertCell();
      left.className = "blob-line-nums";
      var gutter = document.createElement("pre");
      gutter.className = "line-nums";
      gutter.textContent = nums;
      left.appendChild(gutter);
      pre.parentNode.insertBefore(table, pre);
      row.insertCell().appendChild(pre);
    });
  });
  </script>
  <script data-goatcounter="https://nim2d.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
"""
